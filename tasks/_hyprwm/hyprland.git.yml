- name: Downloading hyprland plugins
  ansible.builtin.git:
      repo: https://github.com/hyprwm/hyprland-plugins.git
      dest: '{{ HOME }}/.plugins'
      depth: 1
      recursive: true
      version: v0.45.0
  tags:
      - hyprwm
      - hyprland

- name: Building hyprland plugins
  ansible.builtin.shell: |
      cd {{ HOME }}/.plugins
      make -C borders-plus-plus all
  tags:
      - hypwm
      - hyprland
