- name: Installing hyprland build depedencies for arch
  become: true
  community.general.pacman:
      update_cache: true
      state: 'latest'
      name:
          - wayland
          - wayland-protocols
          - xorg-xwayland
          - cpio
          - mesa
          - systemd-libs
          - gcc-libs
          - glib2
          - glibc
          - glslang
          - cairo
          - seatd
          - pixman
          - tomlplusplus
          - pango
          - xcb-proto
          - xcb-util
          - xcb-util-errors
          - xcb-util-image
          - xcb-util-keysyms
          - xcb-util-renderutil
          - xcb-util-wm
          - libdisplay-info
          - libdrm
          - libglvnd
          - libinput
          - libliftoff
          - libx11
          - libxcb
          - libxcomposite
          - libxcursor
          - libxfixes
          - libxkbcommon
          - libxrender
          # aquamarine
          - pugixml
          - libglvnd
          # hyprlock
          - pam
          # hypridle
          - sdbus-cpp
          # hyprcursor
          - libzip
          - librsvg
  tags:
      - hyprwm
      - hyprland

- name: Downloading hyprland packages repo
  ansible.builtin.git:
      repo: 'https://github.com/{{ item.repo }}.git'
      dest: '{{ HOME }}/{{ item.dest }}'
      depth: 1
      recursive: true
      update: false
      version: '{{ item.version | default(omit) }}'
  loop:
      - {repo: hyprwm/hyprutils, dest: hyprutils, version: v0.2.6}
      - {repo: hyprwm/hyprlang, dest: hyprlang, version: v0.6.0}
      - {
            repo: hyprwm/hyprwayland-scanner,
            dest: hyprwayscanner,
            version: v0.4.2,
        }
      - {repo: hyprwm/aquamarine, dest: hypraquamarine, version: v0.5.1}
      - {repo: hyprwm/hyprgraphics, dest: hyprgraphics, version: v0.1.1}
      - {repo: hyprwm/hyprcursor, dest: hyprcursor, version: v0.1.10}
      - {repo: hyprwm/Hyprland, dest: hyprland, version: v0.45.2}
      - {repo: hyprwm/hyprpaper, dest: hyprpaper, version: v0.7.2}
      - {repo: hyprwm/hypridle, dest: hypridle, version: v0.1.5}
      - {repo: hyprwm/hyprlock, dest: hyprlock, version: v0.5.0}
      - {
            repo: hyprwm/xdg-desktop-portal-hyprland,
            dest: hyprxdp,
            version: v1.3.8,
        }
  tags:
      - hyprwm
      - hyprland

# --- Hyprutils -- #
- name: Building hyprutils package
  ansible.builtin.shell: |
      cd {{ HOME }}/hyprutils
      cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE:STRING=Release -DCMAKE_INSTALL_PREFIX:PATH=/usr -S . -B ./build
      cmake --build ./build --config Release --target all -j`nproc 2>/dev/null || getconf _NPROCESSORS_CONF`
  tags:
      - hyprwm
      - hyprland

- name: Installing hyprutils package
  become: true
  ansible.builtin.shell: |
      cd {{ HOME }}/hyprutils
      cmake --install ./build
  tags:
      - hyprwm
      - hyprland

